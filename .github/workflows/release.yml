name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Release engineering contract
        run: python3 scripts/verify-release-engineering.py
      - name: Reject tags while any release blocker remains
        run: python3 scripts/check-release-readiness.py --static-only --tag '${{ github.ref_name }}'

  quality:
    needs: gate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: python3 scripts/verify-release-engineering.py
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-targets --all-features --locked
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
      - run: dotnet restore desktop/Ariadne.slnx
      - run: dotnet test desktop/Ariadne.slnx --configuration Release --no-restore
      - run: |
          dotnet run --project tools/Ariadne.ReleaseTool/Ariadne.ReleaseTool.csproj -- licenses --root . --output /tmp/THIRD_PARTY_NOTICES.md
          diff -u THIRD_PARTY_NOTICES.md /tmp/THIRD_PARTY_NOTICES.md

  package:
    name: package (${{ matrix.rid }})
    needs: [gate, quality]
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            rid: linux-x64
          - runner: ubuntu-24.04-arm
            rid: linux-arm64
          - runner: windows-2025
            rid: win-x64
          - runner: macos-15-intel
            rid: osx-x64
          - runner: macos-15
            rid: osx-arm64
    runs-on: ${{ matrix.runner }}
    env:
      ARIADNE_REQUIRE_SIGNED_RELEASE: '1'
      ARIADNE_LINUX_SIGNING_KEY: ${{ secrets.ARIADNE_LINUX_SIGNING_KEY }}
      ARIADNE_WINDOWS_SIGNTOOL: ${{ secrets.ARIADNE_WINDOWS_SIGNTOOL }}
      ARIADNE_MACOS_SIGNING_IDENTITY: ${{ secrets.ARIADNE_MACOS_SIGNING_IDENTITY }}
      ARIADNE_MACOS_INSTALLER_IDENTITY: ${{ secrets.ARIADNE_MACOS_INSTALLER_IDENTITY }}
      ARIADNE_MACOS_NOTARY_APPLE_ID: ${{ secrets.ARIADNE_MACOS_NOTARY_APPLE_ID }}
      ARIADNE_MACOS_NOTARY_TEAM_ID: ${{ secrets.ARIADNE_MACOS_NOTARY_TEAM_ID }}
      ARIADNE_MACOS_NOTARY_PASSWORD: ${{ secrets.ARIADNE_MACOS_NOTARY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Release engineering contract
        run: python3 scripts/verify-release-engineering.py
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
        with:
          arch: x64
      - name: Install Windows packaging tool
        if: runner.os == 'Windows'
        shell: pwsh
        run: python3 scripts/run-with-timeout.py --timeout-seconds 600 -- choco install innosetup --no-progress -y
      - name: Import Linux signing key
        if: runner.os == 'Linux'
        shell: bash
        env:
          ARIADNE_LINUX_SIGNING_PRIVATE_KEY: ${{ secrets.ARIADNE_LINUX_SIGNING_PRIVATE_KEY }}
        run: |
          test -n "$ARIADNE_LINUX_SIGNING_PRIVATE_KEY"
          printf '%s' "$ARIADNE_LINUX_SIGNING_PRIVATE_KEY" | base64 --decode | gpg --batch --import
      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          ARIADNE_MACOS_CERTIFICATE_P12: ${{ secrets.ARIADNE_MACOS_CERTIFICATE_P12 }}
          ARIADNE_MACOS_CERTIFICATE_PASSWORD: ${{ secrets.ARIADNE_MACOS_CERTIFICATE_PASSWORD }}
        run: |
          test -n "$ARIADNE_MACOS_CERTIFICATE_P12"
          certificate="$RUNNER_TEMP/ariadne-signing.p12"
          keychain="$RUNNER_TEMP/ariadne-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          printf '%s' "$ARIADNE_MACOS_CERTIFICATE_P12" | base64 --decode > "$certificate"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -P "$ARIADNE_MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security list-keychain -d user -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain"
      - name: Build release layout
        shell: bash
        run: bash scripts/build-release.sh '${{ matrix.rid }}'
      - name: Provision and smoke managed Qdrant
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ARIADNE_QDRANT_CACHE_DIR: ${{ runner.temp }}/ariadne-qdrant-cache
          ARIADNE_RELEASE_EVIDENCE_DIR: ${{ github.workspace }}/artifacts/release-evidence
        run: |
          python3 scripts/run-with-timeout.py --timeout-seconds 1200 -- \
            cargo test --release --locked --package ariadne --test release_acceptance qdrant_runtime_provisioning_installs_then_uses_cache -- --ignored --exact
          python3 scripts/run-with-timeout.py --timeout-seconds 300 -- \
            python3 scripts/qdrant-sidecar-smoke.py \
            --runtime-cache "$ARIADNE_QDRANT_CACHE_DIR" \
            --rid '${{ matrix.rid }}' \
            --provisioning-evidence "$ARIADNE_RELEASE_EVIDENCE_DIR/qdrant-runtime-provisioning.json" \
            --output "$ARIADNE_RELEASE_EVIDENCE_DIR/qdrant-sidecar-${{ matrix.rid }}.json"
      - name: Linux installer
        if: runner.os == 'Linux'
        shell: bash
        run: |
          bash packaging/linux/build-deb.sh "artifacts/staging/ariadne-${{ matrix.rid }}" artifacts
          bash packaging/linux/smoke-deb.sh "$(find artifacts -maxdepth 1 -name 'Ariadne_*.deb' -print -quit)"
      - name: Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & ./packaging/windows/build-installer.ps1 -PackageDirectory "artifacts/staging/ariadne-${{ matrix.rid }}" -OutputDirectory artifacts
          $manifest = Get-Content "artifacts/staging/ariadne-${{ matrix.rid }}/release-manifest.json" -Raw | ConvertFrom-Json
          $installer = Join-Path (Resolve-Path artifacts) "Ariadne-$($manifest.version)-win-x64-setup.exe"
          if (-not (Test-Path $installer)) { throw "expected installer is missing: $installer" }
          & ./packaging/windows/smoke-installer.ps1 -Installer $installer
      - name: macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          bash packaging/macos/build-installer.sh "artifacts/staging/ariadne-${{ matrix.rid }}" artifacts
          version="$(jq -er '.version' "artifacts/staging/ariadne-${{ matrix.rid }}/release-manifest.json")"
          pkg="artifacts/Ariadne-$version-${{ matrix.rid }}.pkg"
          dmg="artifacts/Ariadne-$version-${{ matrix.rid }}.dmg"
          test -f "$pkg"
          test -f "$dmg"
          bash packaging/macos/smoke-installer.sh "$pkg" "$dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: ariadne-${{ matrix.rid }}
          path: artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: qdrant-evidence-${{ matrix.rid }}
          path: artifacts/release-evidence/qdrant-sidecar-${{ matrix.rid }}.json
          if-no-files-found: error

  performance-evidence:
    needs: [gate, quality]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-evidence-arm64
      - name: Install headless display
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Rust release acceptance evidence
        env:
          ARIADNE_RELEASE_EVIDENCE_DIR: ${{ github.workspace }}/artifacts/release-evidence
          ARIADNE_SCHEDULER_SOAK_SECONDS: '300'
        run: |
          cargo test --release --locked --package ariadne --test release_acceptance million_character_retrieval_release_matrix -- --ignored --exact
          cargo test --release --locked --package ariadne --test release_acceptance scheduler_high_runnable_throughput_and_soak -- --ignored --exact
      - name: Desktop release acceptance evidence
        run: |
          dotnet restore desktop/Ariadne.slnx
          dotnet build desktop/Ariadne.Desktop/Ariadne.Desktop.csproj --configuration Release --no-restore
          dotnet desktop/Ariadne.Desktop/bin/Release/net10.0/Ariadne.Desktop.dll --release-wcag-probe artifacts/release-evidence/wcag-contrast.json
          xvfb-run -a -s "-screen 0 1600x900x24" dotnet desktop/Ariadne.Desktop/bin/Release/net10.0/Ariadne.Desktop.dll --release-ui-probe artifacts/release-evidence/desktop-ui-performance.json
      - uses: actions/upload-artifact@v4
        with:
          name: release-performance-evidence
          path: artifacts/release-evidence/
          if-no-files-found: error

  evidence-gate:
    needs: [package, performance-evidence]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-evidence*'
          path: artifacts/release-evidence
          merge-multiple: true
      - run: python3 scripts/check-release-readiness.py --tag '${{ github.ref_name }}' --evidence-dir artifacts/release-evidence

  publish:
    needs: [package, evidence-gate]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*.deb
            release-assets/**/*.asc
            release-assets/**/*.exe
            release-assets/**/*.pkg
            release-assets/**/*.dmg

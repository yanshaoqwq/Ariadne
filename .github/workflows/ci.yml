name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Rust format
        run: cargo fmt --all -- --check
      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Rust tests
        run: cargo test --workspace --all-targets --all-features --locked
      - name: Dependency advisories, sources and licenses
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
      - name: Restore desktop
        run: dotnet restore desktop/Ariadne.slnx
      - name: Desktop tests and localization key audit
        run: dotnet test desktop/Ariadne.slnx --configuration Release --no-restore
      - name: Verify generated third-party notices
        run: |
          dotnet run --project tools/Ariadne.ReleaseTool/Ariadne.ReleaseTool.csproj -- licenses --root . --output /tmp/THIRD_PARTY_NOTICES.md
          diff -u THIRD_PARTY_NOTICES.md /tmp/THIRD_PARTY_NOTICES.md

  native-package:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            rid: linux-x64
          - runner: ubuntu-24.04-arm
            rid: linux-arm64
          - runner: windows-2025
            rid: win-x64
          - runner: macos-15-intel
            rid: osx-x64
          - runner: macos-15
            rid: osx-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rid }}
      - name: Install Windows packaging tool
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y
      - name: Build and verify native release layout
        shell: bash
        run: bash scripts/build-release.sh '${{ matrix.rid }}'
      - name: Build and smoke Linux installer
        if: runner.os == 'Linux'
        shell: bash
        run: |
          bash packaging/linux/build-deb.sh "artifacts/staging/ariadne-${{ matrix.rid }}" artifacts
          deb="$(find artifacts -maxdepth 1 -name 'Ariadne_*.deb' -print -quit)"
          bash packaging/linux/smoke-deb.sh "$deb"
      - name: Build and smoke Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = packaging/windows/build-installer.ps1 -PackageDirectory "artifacts/staging/ariadne-${{ matrix.rid }}" -OutputDirectory artifacts
          packaging/windows/smoke-installer.ps1 -Installer $installer
      - name: Build and smoke macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pkg="$(bash packaging/macos/build-installer.sh "artifacts/staging/ariadne-${{ matrix.rid }}" artifacts)"
          bash packaging/macos/smoke-installer.sh "$pkg"
      - uses: actions/upload-artifact@v4
        with:
          name: ariadne-${{ matrix.rid }}
          path: artifacts/
          if-no-files-found: error

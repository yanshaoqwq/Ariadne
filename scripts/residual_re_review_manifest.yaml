# 00/00A re-review residual inventory manifest — exactly 16 IDs.
# residual_mode quotes 00A residual wording (one line).
# disposition: code-close | already-closed | honest-open-backlog | Non-goal
# test_filter: substring that must appear as "… … ok" in log_path after suite run.
# log_path: relative to SCRATCH (implementer evidence dir).

residuals:
  - id: S3
    residual_mode: "项目配置可反序列化任意 SecretRef.key_id，正式路径向全局 SecretStore 查询并把密钥发往项目可配置 Provider URL"
    product_entry: "core/src/config/store.rs::reject_project_owned_secret_refs + ProjectCredentialScope"
    disposition: already-closed
    test_filter: "project_config_rejects_untrusted_provider_secret_ref"
    suite: p0
    log_path: tests-p0-all.log
    cargo: "cargo test --test config_contracts project_config_rejects_untrusted -- --nocapture"

  - id: S4
    residual_mode: "atomic-commit journal 可指定绝对 final_path/外部 stage_dir，恢复器 rename 或 remove_dir_all 用户目录"

    disposition: already-closed
    test_filter: "project_owned_legacy_journal_is_quarantined_without_execution"
    suite: p0
    log_path: tests-p0-all.log
    cargo: "cargo test --lib config::atomic_commit -- --nocapture"
    extra_test_filters:
      - "forged_project_stage_has_no_recovery_authority"

